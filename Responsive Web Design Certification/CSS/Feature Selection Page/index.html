<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Selection Feature Page</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Feature Selection</h1>
    <div class="feature-card-container">
        <label for="cloud-storage" class="feature-card">
            <input type="checkbox" id="cloud-storage">
            <h3>Cloud Storage</h3>
            <p>100 Gigabyte secure storage</p>           
        </label>
        <label for="dedicated-support" class="feature-card">
            <input type="checkbox" id="dedicated-support">
            <h3>Dedicated Support</h3>
            <p>24/7 customer help</p> 
        </label>
        <label for="advanced-analytics" class="feature-card">
            <input type="checkbox" id="advanced-analytics">
            <h3>Advanced Analytics</h3>
            <p>Insights & reports</p> 
        </label>
        <label for="user-themes" class="feature-card">
            <input type="checkbox" id="user-themes">
            <h3>Custom User Themes</h3>
            <p>Personalized dashboard design</p> 
        </label>
        <label for="user-collab" class="feature-card">
            <input type="checkbox" id="user-collab">
            <h3>Multi-User Collab</h3>
            <p>Team access and sharing</p> 
        </label>
        <label for="api-access" class="feature-card">
            <input type="checkbox" id="api-access">
            <h3>API Access</h3>
            <p>Integrate with your custom built tools</p> 
        </label>
    </div>

</body>

</html>
